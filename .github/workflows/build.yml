name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew

    - name: Generate Random Dummy Icon
      run: |
        RANDOM_COLOR=$(printf '#%06X\n' $((RANDOM%16777215)))
        echo "Using background color: $RANDOM_COLOR"
        
        # Overwrite background with random color
        cat <<EOF > app/src/main/res/drawable/ic_launcher_background.xml
        <?xml version="1.0" encoding="utf-8"?>
        <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108">
            <path android:fillColor="${RANDOM_COLOR}" android:pathData="M0,0h108v108h-108z"/>
        </vector>
        EOF
        
        # Overwrite foreground with transparent vector
        cat <<EOF > app/src/main/res/drawable/ic_launcher_foreground.xml
        <?xml version="1.0" encoding="utf-8"?>
        <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108">
            <path android:fillColor="#00000000" android:pathData="M0,0h108v108h-108z"/>
        </vector>
        EOF
        
        # Strip out any legacy PNG icons so the system relies on the XML
        find app/src/main/res -name "ic_launcher*.png" -type f -delete

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: TTRPG-Advance-Toolkit-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
