name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew

    - name: Generate Random Dummy Icon directly in Mipmap
      run: |
        RANDOM_COLOR=$(printf '#%06X\n' $((RANDOM%16777215)))
        echo "Using dummy icon color: $RANDOM_COLOR"
        
        # 1. Create the mipmap directory if it doesn't exist
        mkdir -p app/src/main/res/mipmap
        
        # 2. Write the vector XML directly as the launcher icon
        cat <<EOF > app/src/main/res/mipmap/ic_launcher.xml
        <?xml version="1.0" encoding="utf-8"?>
        <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="108dp" android:height="108dp" android:viewportWidth="108" android:viewportHeight="108">
            <path android:fillColor="${RANDOM_COLOR}" android:pathData="M0,0h108v108h-108z"/>
        </vector>
        EOF
        
        # 3. Duplicate it for the round icon fallback to satisfy the manifest
        cp app/src/main/res/mipmap/ic_launcher.xml app/src/main/res/mipmap/ic_launcher_round.xml

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: TTRPG-Advance-Toolkit-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
