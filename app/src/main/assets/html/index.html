<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0D0D0F">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="محفظتي">
<title>محفظتي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0D0D0F;font-family:'Cairo',sans-serif;direction:rtl;min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
.blob1{position:fixed;top:-120px;right:-80px;width:350px;height:350px;border-radius:50%;background:radial-gradient(circle,rgba(76,217,100,.12) 0%,transparent 70%);pointer-events:none;z-index:0}
.blob2{position:fixed;bottom:-100px;left:-60px;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(0,122,255,.1) 0%,transparent 70%);pointer-events:none;z-index:0}
.container{max-width:480px;margin:0 auto;padding:24px 16px 100px;position:relative;z-index:1}
.flash{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:999;padding:10px 24px;border-radius:30px;color:#000;font-weight:700;font-size:14px;box-shadow:0 4px 20px rgba(0,0,0,.4);white-space:nowrap;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.subtitle{color:#666;font-size:13px;margin-bottom:4px}
.total-amount{color:#fff;font-size:38px;font-weight:800;line-height:1.1}
.currency{font-size:18px;font-weight:400;color:#888}
.spent-label{color:#777;font-size:12px;margin-top:4px}
.header-actions{display:flex;gap:8px;padding-top:8px}
.icon-btn{background:#1A1A1E;border:1px solid #2A2A2E;border-radius:10px;padding:6px 10px;font-size:16px;cursor:pointer;color:#fff;font-family:inherit;touch-action:manipulation}
.bar-row{display:flex;height:6px;border-radius:6px;overflow:hidden;background:#1A1A1E;margin-bottom:16px;gap:1px}
.bar-seg{height:100%;border-radius:4px;transition:width .5s ease}
.buy-btn{width:100%;background:linear-gradient(135deg,#FF6B6B,#FF9F43);border:none;border-radius:14px;padding:14px 20px;color:#fff;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:16px;box-shadow:0 4px 20px rgba(255,107,107,.3);touch-action:manipulation}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{background:#141416;border:1px solid #222226;border-radius:16px;padding:14px 12px;display:flex;flex-direction:column;gap:8px}
.card-header{display:flex;align-items:center;gap:6px}
.cat-icon{font-size:20px}
.cat-label{color:#ccc;font-size:13px;font-weight:600;flex:1}
.del-btn{background:rgba(255,60,60,.15);border:1px solid rgba(255,60,60,.3);border-radius:8px;color:#ff6b6b;font-size:13px;cursor:pointer;padding:3px 6px;touch-action:manipulation;-webkit-tap-highlight-color:rgba(255,0,0,.2);line-height:1;font-family:inherit}
.val-row{display:flex;flex-direction:column;gap:6px}
.amount-text{font-size:20px;font-weight:800;line-height:1}
.egp{font-size:12px;font-weight:400;opacity:.7}
.edit-btn{background:transparent;border:1px solid;border-radius:8px;padding:4px 8px;font-size:11px;cursor:pointer;font-family:inherit;width:fit-content;touch-action:manipulation}
.edit-row{display:flex;gap:4px;align-items:center}
input[type=text],input[type=number]{background:#0D0D0F;border:1px solid #333;border-radius:8px;padding:8px 12px;color:#fff;font-size:14px;font-family:inherit;width:100%;outline:none;text-align:right}
.save-btn{border:none;border-radius:8px;padding:6px 10px;color:#fff;font-size:14px;cursor:pointer;font-weight:700;font-family:inherit;touch-action:manipulation}
.cancel-btn{background:#2A2A2E;border:none;border-radius:8px;padding:6px 10px;color:#aaa;font-size:14px;cursor:pointer;font-family:inherit;touch-action:manipulation}
.pct-bar{height:3px;background:#222;border-radius:4px;overflow:hidden}
.pct-fill{height:100%;border-radius:4px;transition:width .5s ease}
.pct-label{color:#555;font-size:10px;text-align:left}
.add-card{background:transparent;border:1.5px dashed #2A2A2E;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;min-height:100px;width:100%;touch-action:manipulation}
.add-icon{font-size:28px;color:#444}
.add-text{color:#444;font-size:12px}
.add-title{color:#aaa;font-size:13px;font-weight:600;margin-bottom:8px}
.emoji-row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.emoji-btn{border:1px solid #333;border-radius:8px;padding:4px 6px;font-size:16px;cursor:pointer;color:#fff;background:transparent;touch-action:manipulation}
.emoji-btn.active{background:#333}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#141416;border-radius:20px 20px 0 0;padding:20px 16px 36px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;border:1px solid #222226;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-title{color:#fff;font-size:16px;font-weight:700}
label{color:#888;font-size:12px;display:block;margin-bottom:6px;margin-top:12px}
.exp-cat-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}
.exp-cat-btn{background:#1A1A1E;border:1px solid #2A2A2E;border-radius:20px;padding:5px 10px;color:#aaa;font-size:12px;cursor:pointer;font-family:inherit;touch-action:manipulation}
.exp-cat-btn.active{background:#FF9F43;border-color:#FF9F43;color:#000;font-weight:700}
.src-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:4px}
.src-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 12px;border:1.5px solid #2A2A2E;border-radius:12px;cursor:pointer;min-width:70px;flex-shrink:0;background:#0D0D0F;font-family:inherit;touch-action:manipulation}
.error-text{color:#FF6B6B;font-size:12px;margin-top:8px}
.confirm-btn{width:100%;background:linear-gradient(135deg,#FF6B6B,#FF9F43);border:none;border-radius:12px;padding:13px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:16px;touch-action:manipulation}
.history-box{margin-top:24px;background:#141416;border:1px solid #222226;border-radius:16px;padding:16px}
.history-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.history-title{color:#fff;font-size:15px;font-weight:700}
.empty-text{color:#555;text-align:center;font-size:13px}
.hist-entry{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #1E1E22}
.hist-icon{font-size:20px}
.hist-info{display:flex;flex-direction:column;flex:1}
.hist-cat{color:#ccc;font-size:13px;font-weight:600}
.hist-sub{color:#666;font-size:11px}
.hist-date{color:#555;font-size:11px}
.hist-amounts{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.hist-diff{font-weight:700;font-size:13px}
.hist-bal{color:#555;font-size:10px}
.footer{text-align:center;color:#333;font-size:11px;margin-top:24px}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="blob1"></div>
<div class="blob2"></div>
<div id="flash" class="flash hidden"></div>

<div class="container">
  <div class="header">
    <div>
      <p class="subtitle">إجمالي فلوسك</p>
      <h1 class="total-amount"><span id="totalVal">0.00</span><span class="currency"> ج.م</span></h1>
      <p class="spent-label hidden" id="spentRow">صرفت: <span id="spentVal">0</span> ج.م</p>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="histBtn">📋</button>
      <button class="icon-btn" id="resetBtn">🔄</button>
    </div>
  </div>
  <div class="bar-row" id="barRow"></div>
  <button class="buy-btn" id="buyBtn"><span style="font-size:20px">🛍️</span> سجّل مشترياتك</button>
  <div class="grid" id="grid"></div>
  <div class="history-box hidden" id="historyBox">
    <div class="history-header">
      <h3 class="history-title">📋 سجل المعاملات</h3>
      <button class="icon-btn" id="histCloseBtn">✕</button>
    </div>
    <div id="historyList"></div>
  </div>
  <p class="footer">البيانات محفوظة على جهازك ✓</p>
</div>

<!-- Confirm Modal (shared for delete + reset) -->
<div class="modal-overlay hidden" id="confirmModal">
  <div class="modal" style="padding:28px 20px 32px;border-radius:24px 24px 0 0">
    <div style="text-align:center;margin-bottom:8px;font-size:36px" id="confirmIcon">🗑️</div>
    <h3 style="color:#fff;font-size:17px;font-weight:800;margin-bottom:10px;text-align:center" id="confirmTitle"></h3>
    <p style="color:#666;font-size:13px;text-align:center;margin-bottom:24px;line-height:1.6" id="confirmMsg"></p>
    <button id="confirmOkBtn" style="width:100%;border:none;border-radius:14px;padding:14px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:10px;touch-action:manipulation"></button>
    <button id="confirmCancelBtn" style="width:100%;background:transparent;border:1px solid #2A2A2E;border-radius:14px;padding:13px;color:#888;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;touch-action:manipulation">إلغاء</button>
  </div>
</div>

<!-- Buy Modal -->
<div class="modal-overlay hidden" id="buyModal">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title">🛍️ مشتريات جديدة</h3>
      <button class="icon-btn" id="buyCloseBtn">✕</button>
    </div>
    <label>اشتريت إيه؟</label>
    <input type="text" id="buyName" placeholder="مثال: قهوة، تاكسي، جاكيت...">
    <label>نوع المصروف</label>
    <div class="exp-cat-row" id="expCatRow"></div>
    <label>التمن (ج.م)</label>
    <input type="number" id="buyAmount" placeholder="0.00">
    <label>هتدفع منين؟</label>
    <div class="src-row" id="srcRow"></div>
    <p class="error-text hidden" id="buyError"></p>
    <button class="confirm-btn" id="buyConfirmBtn">✓ تأكيد الخصم</button>
  </div>
</div>

<script>
var BASE_CATS = [
  {id:"wallet",   label:"المحفظة",     icon:"👛", color:"#F5A623"},
  {id:"instapay", label:"انستا باي",   icon:"📱", color:"#4CD964"},
  {id:"bank",     label:"البنك",        icon:"🏦", color:"#007AFF"},
  {id:"vodafone", label:"فودافون كاش", icon:"💳", color:"#E53935"},
  {id:"other",    label:"أخرى",         icon:"💰", color:"#AF52DE"}
];
var EXP_CATS = ["🍔 أكل","🚗 مواصلات","🛒 تسوق","💊 صحة","🎮 ترفيه","📚 تعليم","🏠 إيجار","أخرى"];
var CUSTOM_COLORS = ["#FF6B6B","#FFD93D","#6BCB77","#4D96FF","#C77DFF","#FF9F43"];

var amounts = loadData("moneyAmounts", {});
var customCats = loadData("customCats", []);
var txHistory = loadData("moneyHistory", []);
var selectedExpCat = "أخرى";
var selectedSrc = "";
var editingId = null;
var pendingDeleteId = null;

function loadData(k, def){ try{ var v=JSON.parse(localStorage.getItem(k)); return v||def; }catch(e){ return def; } }
function saveData(k,v){ localStorage.setItem(k, JSON.stringify(v)); }

function getAllCats(){
  var deleted = loadData("deletedCats",[]);
  var base = BASE_CATS.filter(function(c){ return deleted.indexOf(c.id)===-1; });
  return base.concat(customCats);
}

function fmtNum(n){
  return Number(n||0).toLocaleString("ar-EG",{minimumFractionDigits:2,maximumFractionDigits:2});
}
function nowDate(){ return new Date().toLocaleDateString("ar-EG"); }
function nowTime(){ return new Date().toLocaleTimeString("ar-EG",{hour:"2-digit",minute:"2-digit"}); }

function showFlash(msg, color){
  var el = document.getElementById("flash");
  el.textContent = msg;
  el.style.background = color || "#4CD964";
  el.classList.remove("hidden");
  clearTimeout(showFlash._t);
  showFlash._t = setTimeout(function(){ el.classList.add("hidden"); }, 2500);
}

function saveAll(){
  saveData("moneyAmounts", amounts);
  saveData("customCats", customCats);
  saveData("moneyHistory", txHistory);
}

function render(){
  saveAll();
  var cats = getAllCats();
  var total = 0;
  for(var i=0;i<cats.length;i++) total += Number(amounts[cats[i].id]||0);

  var spent = 0;
  for(var j=0;j<txHistory.length;j++) if(txHistory[j].type==="expense") spent+=txHistory[j].amount;

  document.getElementById("totalVal").textContent = fmtNum(total);
  var spentRow = document.getElementById("spentRow");
  if(spent>0){
    spentRow.classList.remove("hidden");
    document.getElementById("spentVal").textContent = fmtNum(spent);
  } else {
    spentRow.classList.add("hidden");
  }

  // bar
  var bar = document.getElementById("barRow");
  bar.innerHTML = "";
  for(var k=0;k<cats.length;k++){
    var pct = total>0 ? Math.round(Number(amounts[cats[k].id]||0)/total*100) : 0;
    if(!pct) continue;
    var seg = document.createElement("div");
    seg.className = "bar-seg";
    seg.style.width = pct+"%";
    seg.style.background = cats[k].color;
    bar.appendChild(seg);
  }

  // grid
  var grid = document.getElementById("grid");
  grid.innerHTML = "";

  for(var m=0;m<cats.length;m++){
    (function(cat){
      var val = Number(amounts[cat.id]||0);
      var pct = total>0 ? Math.round(val/total*100) : 0;
      var card = document.createElement("div");
      card.className = "card";
      card.style.borderTop = "3px solid "+cat.color;

      if(editingId === cat.id){
        // edit mode
        var hdr = document.createElement("div");
        hdr.className = "card-header";
        hdr.innerHTML = '<span class="cat-icon">'+cat.icon+'</span><span class="cat-label">'+cat.label+'</span>';
        card.appendChild(hdr);

        var row = document.createElement("div");
        row.className = "edit-row";
        var inp = document.createElement("input");
        inp.type = "number"; inp.placeholder = "0.00";
        inp.value = amounts[cat.id] || "";
        inp.style.flex = "1";
        var svBtn = document.createElement("button");
        svBtn.className = "save-btn";
        svBtn.style.background = cat.color;
        svBtn.textContent = "✓";
        var cxBtn = document.createElement("button");
        cxBtn.className = "cancel-btn";
        cxBtn.textContent = "✕";
        svBtn.addEventListener("click", function(){
          var v = parseFloat(inp.value);
          if(!isNaN(v) && v>=0){
            var old = Number(amounts[cat.id]||0);
            txHistory.unshift({id:Date.now(),type:"balance",date:nowDate(),time:nowTime(),cat:cat.label,icon:cat.icon,from:old,to:v,diff:v-old});
            if(txHistory.length>100) txHistory.pop();
            amounts[cat.id] = v;
          }
          editingId = null; render();
        });
        cxBtn.addEventListener("click", function(){ editingId=null; render(); });
        row.appendChild(inp); row.appendChild(svBtn); row.appendChild(cxBtn);
        card.appendChild(row);
        setTimeout(function(){ inp.focus(); inp.select(); }, 50);

      } else {
        // view mode
        var hdr2 = document.createElement("div");
        hdr2.className = "card-header";
        var iconSpan = document.createElement("span");
        iconSpan.className = "cat-icon"; iconSpan.textContent = cat.icon;
        var labelSpan = document.createElement("span");
        labelSpan.className = "cat-label"; labelSpan.textContent = cat.label;
        var dBtn = document.createElement("button");
        dBtn.className = "del-btn";
        dBtn.textContent = "🗑️";
        dBtn.addEventListener("click", function(e){
          e.stopPropagation();
          openDeleteModal(cat.id, cat.label);
        });
        hdr2.appendChild(iconSpan);
        hdr2.appendChild(labelSpan);
        hdr2.appendChild(dBtn);
        card.appendChild(hdr2);

        var valRow = document.createElement("div");
        valRow.className = "val-row";
        var amtSpan = document.createElement("span");
        amtSpan.className = "amount-text";
        amtSpan.style.color = cat.color;
        amtSpan.innerHTML = fmtNum(val)+' <span class="egp">ج.م</span>';
        var edBtn = document.createElement("button");
        edBtn.className = "edit-btn";
        edBtn.style.borderColor = cat.color;
        edBtn.style.color = cat.color;
        edBtn.textContent = "✏️ تعديل";
        edBtn.addEventListener("click", function(){ editingId=cat.id; render(); });
        valRow.appendChild(amtSpan);
        valRow.appendChild(edBtn);
        card.appendChild(valRow);

        if(total>0){
          var pb = document.createElement("div"); pb.className="pct-bar";
          var pf = document.createElement("div"); pf.className="pct-fill";
          pf.style.width=pct+"%"; pf.style.background=cat.color;
          pb.appendChild(pf); card.appendChild(pb);
          var pl = document.createElement("p"); pl.className="pct-label";
          pl.textContent=pct+"% من الإجمالي"; card.appendChild(pl);
        }
      }
      grid.appendChild(card);
    })(cats[m]);
  }

  // add category card
  var addCard = document.createElement("div");
  if(window._showAddCat){
    addCard.className = "card";
    addCard.style.borderTop = "3px dashed #888";
    var addTitle = document.createElement("p"); addTitle.className="add-title"; addTitle.textContent="فئة جديدة";
    addCard.appendChild(addTitle);
    var emojiRow = document.createElement("div"); emojiRow.className="emoji-row";
    ["💵","💸","🏧","📲","🪙","💎","🎯","🛒"].forEach(function(e){
      var eb = document.createElement("button"); eb.className="emoji-btn"+(window._newIcon===e?" active":"");
      eb.textContent=e;
      eb.addEventListener("click",function(){ window._newIcon=e; render(); });
      emojiRow.appendChild(eb);
    });
    addCard.appendChild(emojiRow);
    var nameInp = document.createElement("input"); nameInp.type="text"; nameInp.placeholder="اسم الفئة"; nameInp.style.marginBottom="8px";
    addCard.appendChild(nameInp);
    var btnRow = document.createElement("div"); btnRow.style.cssText="display:flex;gap:6px";
    var addOk = document.createElement("button"); addOk.className="save-btn"; addOk.style.cssText="background:#4CD964;flex:1"; addOk.textContent="إضافة";
    var addCx = document.createElement("button"); addCx.className="cancel-btn"; addCx.style.flex="1"; addCx.textContent="إلغاء";
    addOk.addEventListener("click",function(){
      var name = nameInp.value.trim();
      if(!name) return;
      var id = "custom_"+Date.now();
      var color = CUSTOM_COLORS[customCats.length % CUSTOM_COLORS.length];
      customCats.push({id:id,label:name,icon:window._newIcon||"💵",color:color});
      window._showAddCat=false; render();
    });
    addCx.addEventListener("click",function(){ window._showAddCat=false; render(); });
    btnRow.appendChild(addOk); btnRow.appendChild(addCx);
    addCard.appendChild(btnRow);
  } else {
    addCard.className = "add-card";
    addCard.innerHTML = '<span class="add-icon">+</span><span class="add-text">فئة جديدة</span>';
    addCard.addEventListener("click",function(){ window._showAddCat=true; window._newIcon="💵"; render(); });
  }
  grid.appendChild(addCard);

  renderHistory();
}

// ─── Confirm Modal ────────────────────────────────────────────────────────
var _confirmCallback = null;
function showConfirm(opts){
  document.getElementById("confirmIcon").textContent  = opts.icon    || "❓";
  document.getElementById("confirmTitle").textContent = opts.title   || "";
  document.getElementById("confirmMsg").textContent   = opts.msg     || "";
  var okBtn = document.getElementById("confirmOkBtn");
  okBtn.textContent  = opts.btnText  || "تأكيد";
  okBtn.style.background = opts.btnColor || "linear-gradient(135deg,#FF6B6B,#E53935)";
  _confirmCallback = opts.onOk || null;
  document.getElementById("confirmModal").classList.remove("hidden");
}
document.getElementById("confirmOkBtn").addEventListener("click", function(){
  document.getElementById("confirmModal").classList.add("hidden");
  if(_confirmCallback){ _confirmCallback(); _confirmCallback=null; }
});
document.getElementById("confirmCancelBtn").addEventListener("click", function(){
  document.getElementById("confirmModal").classList.add("hidden");
  _confirmCallback = null;
  pendingDeleteId = null;
});
function openDeleteModal(id, label){
  pendingDeleteId = id;
  showConfirm({
    icon:"🗑️",
    title:"مسح الفئة",
    msg:'هتمسح فئة "'+label+'"؟ الرصيد اللي فيها هيتمسح برضو.',
    btnText:"نعم، امسح",
    btnColor:"linear-gradient(135deg,#FF6B6B,#E53935)",
    onOk: function(){
      var deleted = loadData("deletedCats",[]);
      if(deleted.indexOf(pendingDeleteId)===-1){ deleted.push(pendingDeleteId); saveData("deletedCats",deleted); }
      customCats = customCats.filter(function(c){ return c.id!==pendingDeleteId; });
      delete amounts[pendingDeleteId];
      pendingDeleteId = null;
      render();
    }
  });
}

// ─── History ──────────────────────────────────────────────────────────────
document.getElementById("histBtn").addEventListener("click", function(){
  document.getElementById("historyBox").classList.toggle("hidden");
  renderHistory();
});
document.getElementById("histCloseBtn").addEventListener("click", function(){
  document.getElementById("historyBox").classList.add("hidden");
});
function renderHistory(){
  var list = document.getElementById("historyList");
  if(!list) return;
  if(!txHistory.length){ list.innerHTML='<p class="empty-text">مفيش معاملات لسه</p>'; return; }
  var html = "";
  for(var i=0;i<txHistory.length;i++){
    var h = txHistory[i];
    var diffColor = h.diff>=0 ? "#4CD964" : "#FF6B6B";
    var diffTxt = (h.diff>=0?"+":"")+fmtNum(h.diff);
    var info = h.type==="expense"
      ? '<span class="hist-cat">'+h.name+'</span><span class="hist-sub">'+h.expCat+' · من '+h.cat+'</span>'
      : '<span class="hist-cat">'+h.cat+' — تعديل رصيد</span>';
    html += '<div class="hist-entry"><span class="hist-icon">'+h.icon+'</span><div class="hist-info">'+info+'<span class="hist-date">'+h.date+' · '+h.time+'</span></div><div class="hist-amounts"><span class="hist-diff" style="color:'+diffColor+'">'+diffTxt+'</span><span class="hist-bal">'+fmtNum(h.to)+' ج.م</span></div></div>';
  }
  list.innerHTML = html;
}

// ─── Reset ────────────────────────────────────────────────────────────────
document.getElementById("resetBtn").addEventListener("click", function(){
  showConfirm({
    icon:"🔄",
    title:"إعادة تعيين",
    msg:"هيتمسح كل الأرقام ويرجعوا صفر. مش هتقدر تتراجع!",
    btnText:"نعم، إعادة تعيين",
    btnColor:"linear-gradient(135deg,#FF9F43,#F5A623)",
    onOk: function(){
      var cats = getAllCats();
      for(var i=0;i<cats.length;i++) amounts[cats[i].id]=0;
      render();
    }
  });
});

// ─── Buy Modal ────────────────────────────────────────────────────────────
document.getElementById("buyBtn").addEventListener("click", openBuy);
document.getElementById("buyCloseBtn").addEventListener("click", function(){ document.getElementById("buyModal").classList.add("hidden"); });
document.getElementById("buyModal").addEventListener("click", function(e){ if(e.target===this) this.classList.add("hidden"); });

function openBuy(){
  selectedExpCat = "أخرى";
  selectedSrc = "";
  document.getElementById("buyName").value = "";
  document.getElementById("buyAmount").value = "";
  document.getElementById("buyError").classList.add("hidden");
  // exp cats
  var ecRow = document.getElementById("expCatRow");
  ecRow.innerHTML = "";
  EXP_CATS.forEach(function(ec){
    var btn = document.createElement("button");
    btn.className = "exp-cat-btn"+(ec===selectedExpCat?" active":"");
    btn.textContent = ec;
    btn.addEventListener("click", function(){
      selectedExpCat = ec;
      ecRow.querySelectorAll(".exp-cat-btn").forEach(function(b){ b.classList.remove("active"); });
      btn.classList.add("active");
    });
    ecRow.appendChild(btn);
  });
  renderSrcRow();
  document.getElementById("buyModal").classList.remove("hidden");
  setTimeout(function(){ document.getElementById("buyName").focus(); }, 300);
}

function renderSrcRow(){
  var sr = document.getElementById("srcRow");
  sr.innerHTML = "";
  var cats = getAllCats();
  for(var i=0;i<cats.length;i++){
    (function(cat){
      var bal = Number(amounts[cat.id]||0);
      var btn = document.createElement("button");
      btn.className = "src-btn";
      btn.style.borderColor = selectedSrc===cat.id ? cat.color : "#2A2A2E";
      btn.style.background = selectedSrc===cat.id ? cat.color+"22" : "#0D0D0F";
      btn.style.opacity = bal===0 ? "0.4" : "1";
      btn.disabled = bal===0;
      btn.innerHTML = '<span style="font-size:18px">'+cat.icon+'</span><span style="font-size:11px;color:#ccc">'+cat.label+'</span><span style="font-size:11px;font-weight:700;color:'+cat.color+'">'+fmtNum(bal)+'</span>';
      btn.addEventListener("click", function(){ selectedSrc=cat.id; renderSrcRow(); });
      sr.appendChild(btn);
    })(cats[i]);
  }
}

document.getElementById("buyConfirmBtn").addEventListener("click", function(){
  var errEl = document.getElementById("buyError");
  errEl.classList.add("hidden");
  var name = document.getElementById("buyName").value.trim();
  var amt = parseFloat(document.getElementById("buyAmount").value);
  if(!name){ errEl.textContent="⚠️ اكتب اسم المشتريات"; errEl.classList.remove("hidden"); return; }
  if(isNaN(amt)||amt<=0){ errEl.textContent="⚠️ اكتب مبلغ صح"; errEl.classList.remove("hidden"); return; }
  if(!selectedSrc){ errEl.textContent="⚠️ اختار هتدفع منين"; errEl.classList.remove("hidden"); return; }
  var bal = Number(amounts[selectedSrc]||0);
  var cats = getAllCats();
  var cat = null;
  for(var i=0;i<cats.length;i++) if(cats[i].id===selectedSrc){ cat=cats[i]; break; }
  if(amt>bal){ errEl.textContent="⚠️ المبلغ أكبر من الرصيد! عندك "+fmtNum(bal)+" ج.م فقط"; errEl.classList.remove("hidden"); return; }
  var newBal = bal-amt;
  amounts[selectedSrc] = newBal;
  txHistory.unshift({id:Date.now(),type:"expense",date:nowDate(),time:nowTime(),name:name,expCat:selectedExpCat,cat:cat?cat.label:"",icon:"🛍️",amount:amt,from:bal,to:newBal,diff:-amt});
  if(txHistory.length>100) txHistory.pop();
  showFlash("✓ اتخصم "+fmtNum(amt)+" ج.م من "+(cat?cat.label:""), "#4CD964");
  document.getElementById("buyModal").classList.add("hidden");
  render();
});

// ─── Service Worker ───────────────────────────────────────────────────────
if("serviceWorker" in navigator){
  var swCode='const CACHE="mahfazati-v1";const FILES=["./"];self.addEventListener("install",e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(FILES))));self.addEventListener("fetch",e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));';
  var blob = new Blob([swCode],{type:"application/javascript"});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(function(){});
}

// ─── Init ─────────────────────────────────────────────────────────────────
window._showAddCat = false;
window._newIcon = "💵";
render();
</script>
